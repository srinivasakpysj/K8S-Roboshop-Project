apiVersion: apps/v1                  # API group for Deployment resources
kind: Deployment                     # Deployment manages ReplicaSets and Pods

metadata:
  name: mongodb                      # Name of the Deployment
  namespace: roboshop                # Namespace where this Deployment will be created (must exist)
  labels:                            # Labels for identifying this Deployment
    project: roboshop
    component: mongodb
    tier: db

spec:
  replicas: 1                        # Number of desired Pods (DB usually runs as single instance unless clustered)

  selector:                          # Used to identify Pods managed by this Deployment
    matchLabels:                     # Must EXACTLY match template labels
      project: roboshop
      component: mongodb
      tier: db

  template:                          # Pod template (used to create Pods)
    metadata:
      labels:                        # Labels assigned to Pods
        project: roboshop
        component: mongodb
        tier: db

    spec:
      containers:
      - name: mongodb                # Container name
        image: srinivasakysj/mongodb:v1   # Custom MongoDB image (must exist in registry)
        imagePullPolicy: Always
        readinessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 27017
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: mongodb
    tier: db
  ports:
  - protocol: TCP
    port: 27017
    targetPort: 27017
# ------------------ NGINX CONFIGMAP ------------------
apiVersion: v1                         # Core Kubernetes API group (used for basic resources)
kind: ConfigMap                        # ConfigMap stores configuration data (nginx config here)

metadata:
  name: nginx-config                   # Name of ConfigMap (referenced in Deployment)
  namespace: roboshop                 # Namespace where this ConfigMap exists

data:
  nginx.conf: |                        # Key = filename, value = full nginx configuration (multi-line)
    user nginx;                       # Worker process runs as nginx user
    worker_processes auto;            # Automatically decide number of worker processes
    error_log /var/log/nginx/error.log notice;  # Error log location
    pid /run/nginx.pid;               # PID file location

    include /usr/share/nginx/modules/*.conf;  # Load additional nginx modules

    events {
        worker_connections 1024;      # Maximum concurrent connections per worker
    }

    http {
        include /etc/nginx/mime.types;         # MIME type definitions
        default_type application/octet-stream; # Default content type

        sendfile on;                 # Enable efficient file transfer
        keepalive_timeout 65;        # Keep connection alive for 65 seconds

        server {
            listen 80;               # Listen on port 80
            server_name _;           # Default server (matches any hostname)
            root /usr/share/nginx/html;  # Static files location

            location / {
                try_files $uri /index.html;  # SPA routing → fallback to index.html
            }

            # Reverse proxy rules (routes API calls to backend services)
            location /api/catalogue/ { proxy_pass http://catalogue:8080/; }  # Calls catalogue service
            location /api/user/ { proxy_pass http://user:8080/; }            # Calls user service
            location /api/cart/ { proxy_pass http://cart:8080/; }            # Calls cart service
            location /api/shipping/ { proxy_pass http://shipping:8080/; }    # Calls shipping service
            location /api/payment/ { proxy_pass http://payment:8080/; }      # Calls payment service
        }
    }

---
# ------------------ APP CONFIGMAP ------------------
apiVersion: v1                        # Core API group
kind: ConfigMap                      # Stores application environment variables

metadata:
  name: frontend-env                 # ConfigMap name
  namespace: roboshop

data:
  MONGO: "true"                     # Enables MongoDB usage in frontend (if required)
  REDIS_URL: "redis://redis:6379"   # Redis Service DNS and port
  MONGO_URL: "mongodb://mongodb:27017/frontends"  # MongoDB connection string

---
# ------------------ DEPLOYMENT ------------------
apiVersion: apps/v1                 # API group for Deployment
kind: Deployment                   # Deployment manages ReplicaSets → Pods

metadata:
  name: frontend                   # Deployment name
  namespace: roboshop
  labels:
    project: roboshop              # Logical grouping label
    component: frontend            # Identifies this service
    tier: frontend                 # Frontend layer

spec:
  replicas: 1                      # Number of Pods to run

  selector:
    matchLabels:                   # Used to match Pods managed by Deployment
      project: roboshop
      component: frontend
      tier: frontend

  template:
    metadata:
      labels:                      # Labels assigned to Pods
        project: roboshop
        component: frontend
        tier: frontend

    spec:
      containers:
      - name: frontend             # Container name
        image: srinivasakysj/frontend:v1   # Docker image (nginx-based frontend)
        imagePullPolicy: IfNotPresent      # Pull image only if not present locally

        ports:
        - name: http-port          # Named port (used in probes)
          containerPort: 80        # Application runs on port 80

        envFrom:
        - configMapRef:
            name: frontend-env     # Inject all ConfigMap values as env variables

        readinessProbe:            # Checks if container is READY to serve traffic
          httpGet:
            path: /                # Root path check
            port: http-port
          initialDelaySeconds: 10  # Wait before first check
          periodSeconds: 15        # Check every 15 seconds
          failureThreshold: 3      # Allow failures before marking NOT READY

        livenessProbe:             # Checks if container is ALIVE
          httpGet:
            path: /                # Root path check
            port: http-port
          initialDelaySeconds: 20  # Delay before checking liveness
          periodSeconds: 15        # Check interval
          failureThreshold: 3      # Restart only after multiple failures

        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf   # Replace default nginx config
          subPath: nginx.conf                # Mount only the file, not full directory

      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config       # Reference to nginx ConfigMap

---
# ------------------ SERVICE ------------------
apiVersion: v1                    # Core API group
kind: Service                     # Exposes Pods via stable network endpoint

metadata:
  name: frontend                  # Service name (used as DNS inside cluster)
  namespace: roboshop

spec:
  type: LoadBalancer              # Exposes service externally (cloud providers)

  selector:
    project: roboshop             # Matches Pods with these labels
    component: frontend
    tier: frontend

  ports:
  - protocol: TCP                 # Network protocol
    port: 80                      # External port
    targetPort: 80                # Container port inside Pod
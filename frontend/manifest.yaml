apiVersion: v1                         # Core API group (used for ConfigMap, Service, etc.)
kind: ConfigMap                        # ConfigMap stores non-sensitive configuration files

metadata:
  name: frontend                          # Name of ConfigMap (referenced in Deployment)
  namespace: roboshop                  # Must match Deployment namespace

data:
  nginx.conf: |                            # Key = filename, value = file content (multi-line using |)
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log notice;
    pid /run/nginx.pid;

    include /usr/share/nginx/modules/*.conf;

    events {
        worker_connections 1024;
    }

    http {
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';

        access_log  /var/log/nginx/access.log  main;

        sendfile            on;
        tcp_nopush          on;
        keepalive_timeout   65;
        types_hash_max_size 4096;

        include             /etc/nginx/mime.types;
        default_type        application/octet-stream;

        include /etc/nginx/conf.d/*.conf;

        server {
            listen       80;
            listen       [::]:80;
            server_name  _;
            root         /usr/share/nginx/html;

            include /etc/nginx/default.d/*.conf;

            error_page 404 /404.html;
            location = /404.html {
            }

            error_page 500 502 503 504 /50x.html;
            location = /50x.html {
            }

            location /images/ {
              expires 5s;
              root   /usr/share/nginx/html;
              try_files $uri /images/placeholder.jpg;
            }
            location /api/catalogue/ { proxy_pass http://catalogue:8080/; }
            location /api/user/ { proxy_pass http://user:8080/; }
            location /api/cart/ { proxy_pass http://cart:8080/; }
            location /api/shipping/ { proxy_pass http://shipping:8080/; }
            location /api/payment/ { proxy_pass http://payment:8080/; }

            location /health {
              stub_status on;
              access_log off;
            }

        }
    }

---
apiVersion: v1                      # Core Kubernetes API group (used for ConfigMap, Service, etc.)
kind: ConfigMap                     # Stores non-sensitive configuration as key-value pairs

metadata:
  name: frontend                        # Name of ConfigMap (referenced in Deployment)
  namespace: roboshop               # Must be same namespace as Deployment

data:
  MONGO: "true"                     # Enables MongoDB usage in application
  REDIS_URL: "redis://redis:6379"   # Redis connection string (Service DNS + port)
  MONGO_URL: "mongodb://mongodb:27017/frontends"  # MongoDB connection string (Service DNS + DB name)

---
apiVersion: apps/v1                 # API group for Deployment resources
kind: Deployment                   # Deployment manages ReplicaSets → Pods

metadata:
  name: frontend                        # Name of Deployment
  namespace: roboshop               # Namespace where resources are created
  labels:
    project: roboshop               # Logical grouping label
    component: frontend                 # Identifies this microservice
    tier: frontend                   # frontend layer

spec:
  replicas: 1                       # Desired number of Pods

  selector:
    matchLabels:                    # Used by Deployment to identify Pods
      project: roboshop             # MUST match template labels exactly
      component: frontend
      tier: frontend

  template:
    metadata:
      labels:                       # Labels applied to Pods
        project: roboshop
        component: frontend
        tier: frontend

    spec:
      containers:
      - name: frontend                  # Container name
        image: srinivasakysj/frontend:v1   # Application image
        imagePullPolicy: Always  # Pull image only if not present (better for performance)
        ports:
        - name: http-port           # Named port (used in probes)
          containerPort: 80       # Application runs on port 80

        readinessProbe:             # Determines when Pod is READY to serve traffic
          httpGet:
            path: /           # Health endpoint exposed by application
            port: http-port
          initialDelaySeconds: 10   # Wait before first check (allow app startup)
          periodSeconds: 15         # Check every 15 seconds
          failureThreshold: 3       # Allow 3 failures before marking NOT READY

        livenessProbe:              # Determines if container is ALIVE
          httpGet:
            path: /
            port: http-port
          initialDelaySeconds: 20   # Start later to avoid premature restarts
          periodSeconds: 15         # Check every 15 seconds
          failureThreshold: 3       # Restart only after multiple failures
        volumeMounts:
        - name: nginx-config           # Volume name
          mountPath: /etc/nginx/nginx.conf  # Path inside container
          subPath: nginx.conf              # Mount only this file (not full directory)

      volumes:
      - name: nginx-config             # Volume definition
        configMap:
          name: frontend                 # Refers to ConfigMap above

---
apiVersion: v1                     # Core API group
kind: Service                      # Service exposes Pods via stable DNS

metadata:
  name: frontend                       # Service name (used as DNS inside cluster)
  namespace: roboshop

spec:
  type: LoadBalancer
  selector:                        # Matches Pods using labels
    project: roboshop              # Must EXACTLY match Pod labels
    component: frontend
    tier: frontend

  ports:
  - protocol: TCP                  # Network protocol
    port: 80                     # Service port (clients connect here)
    targetPort: 80               # Container port inside Pod
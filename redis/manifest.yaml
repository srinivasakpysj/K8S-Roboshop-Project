apiVersion: apps/v1                  # API group for Deployment resources
kind: Deployment                     # Deployment manages ReplicaSets which in turn manage Pods

metadata:
  name: redis                        # Name of the Deployment (unique within namespace)
  namespace: roboshop                # Namespace where this Deployment will be created
  labels:
    project: roboshop                # Logical grouping label across all services
    component: redis                 # Identifies this component (Redis service)
    tier: db                         # Indicates database layer in architecture

spec:
  replicas: 1                        # Desired number of Pods (Deployment ensures 1 always runs)

  selector:
    matchLabels:                     # Used by Deployment to identify its Pods
      project: roboshop              # MUST match Pod template labels exactly
      component: redis
      tier: db

  template:                          # Pod template (blueprint for creating Pods)
    metadata:
      labels:                        # Labels assigned to Pods
        project: roboshop
        component: redis
        tier: db

    spec:
      containers:                    # List of containers inside Pod
      - name: redis                  # Container name
        image: redis:7.0             # Official Redis image (version 7.0)
        imagePullPolicy: Always      # Always pulls image from registry (good for dev/testing)

        readinessProbe:              # Determines if Pod is READY to accept traffic
          tcpSocket:                 # TCP-based check (suitable for Redis, no HTTP endpoint)
            port: 6379               # Redis default port
          initialDelaySeconds: 10    # Wait 10 seconds before first check (startup time)
          periodSeconds: 10          # Check every 10 seconds

        livenessProbe:               # Determines if container is ALIVE
          tcpSocket:
            port: 6379               # If port is not reachable → container will be restarted
          initialDelaySeconds: 5     # Starts checking after 5 seconds (⚠️ may be slightly early)
          periodSeconds: 5           # Check every 5 seconds

---
apiVersion: v1                      # Core API group for Service resource
kind: Service                       # Service exposes Pods via stable network endpoint

metadata:
  name: redis                       # Service name (used as DNS inside cluster)
  namespace: roboshop               # Same namespace as Deployment

spec:
  selector:                         # Service routes traffic to Pods matching these labels
    project: roboshop               # Must EXACTLY match Pod labels
    component: redis
    tier: db

  ports:
  - protocol: TCP                   # Network protocol used
    port: 6379                      # Service port (clients connect using this)
    targetPort: 6379                # Container port inside Pod where traffic is forwarded
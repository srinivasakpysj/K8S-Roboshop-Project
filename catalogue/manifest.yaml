apiVersion: v1                     # Core Kubernetes API group (used for basic resources like ConfigMap)
kind: ConfigMap                    # Defines a ConfigMap (stores non-sensitive key-value configuration)

metadata:
  name: catalogue                  # Name of the ConfigMap (referenced in Deployment)
  namespace: roboshop              # Namespace where this ConfigMap exists (must match Deployment namespace)

data:
  MONGO: "true"                    # Key-value pair → becomes environment variable MONGO=true inside container
  MONGO_URL: "mongodb://mongodb:27017/catalogue"  # MongoDB connection string:
                                                 # mongodb → Service name (DNS)
                                                 # 27017 → MongoDB port
                                                 # catalogue → database name

---
apiVersion: apps/v1                # API group for Deployment resources
kind: Deployment                  # Deployment manages ReplicaSets → which manage Pods

metadata:
  name: catalogue                 # Name of the Deployment (unique within namespace)
  namespace: roboshop             # Namespace where Deployment will be created
  labels:
    project: roboshop             # Label used for grouping resources logically
    component: catalogue          # Identifies this backend service
    tier: backend                 # Architecture layer (backend service)

spec:
  replicas: 1                     # Desired number of Pods (Deployment ensures always 1 is running)

  selector:
    matchLabels:                  # Deployment uses this to identify its Pods
      project: roboshop           # MUST match template labels exactly
      component: catalogue
      tier: backend

  template:                       # Pod template (blueprint used to create Pods)
    metadata:
      labels:                     # Labels applied to Pods created by Deployment
        project: roboshop
        component: catalogue
        tier: backend

    spec:
      containers:                 # List of containers inside the Pod
      - name: catalogue           # Name of container
        image: srinivasakysj/catalogue:v1   # Docker image (must exist in registry)
        imagePullPolicy: Always   # Always pulls latest image (useful in dev, not ideal for prod)

        envFrom:                  # Imports environment variables from external source
        - configMapRef:           # Reference to a ConfigMap
            name: catalogue       # Loads ALL keys from this ConfigMap as environment variables

        ports:
        - name: liveness-port     # Named port (used in probes instead of numeric value)
          containerPort: 8080     # Application listens on port 8080 inside container

        readinessProbe:           # Checks if Pod is READY to receive traffic
          httpGet:                # HTTP-based health check
            path: /health         # Endpoint exposed by application for health check
            port: liveness-port   # Uses named port (maps to containerPort 8080)
          failureThreshold: 1     # After 1 failure → Pod marked NOT READY (⚠️ aggressive)
          periodSeconds: 15       # Probe runs every 15 seconds

        livenessProbe:            # Checks if container is ALIVE (restarts if unhealthy)
          httpGet:
            path: /health         # Same health endpoint
            port: liveness-port
          failureThreshold: 1     # After 1 failure → container restarted (⚠️ risky)
          periodSeconds: 15       # Probe runs every 15 seconds

---
apiVersion: v1                    # Core API group for Service
kind: Service                     # Service exposes Pods via stable network endpoint

metadata:
  name: catalogue                 # Service name (used for DNS inside cluster)
  namespace: roboshop             # Must be same namespace as Deployment

spec:
  selector:                       # Used to find target Pods
    project: roboshop             # Must EXACTLY match Pod labels
    component: catalogue
    tier: backend

  ports:
  - protocol: TCP                 # Network protocol used
    port: 8080                    # Port exposed by Service (clients connect here)
    targetPort: 8080              # Port on container where traffic is forwarded
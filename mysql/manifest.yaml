apiVersion: v1                         # Core API group (used for ConfigMap, Service, etc.)
kind: ConfigMap                        # ConfigMap stores non-sensitive configuration files

metadata:
  name: mysql                          # Name of ConfigMap (referenced in Deployment)
  namespace: roboshop                  # Must match Deployment namespace

data:
  my.cnf: |                            # Key = filename, value = file content (multi-line using |)
    [mysqld]                           # MySQL server configuration section
    innodb_redo_log_capacity=2G        # Example tuning parameter for redo log size

---
apiVersion: apps/v1                    # API group for Deployment resources
kind: Deployment                      # Deployment manages ReplicaSets → Pods

metadata:
  name: mysql                          # Deployment name
  namespace: roboshop                  # Namespace where resources are created
  labels:
    project: roboshop                  # Logical grouping label
    component: mysql                  # Identifies MySQL service
    tier: db                          # Database layer

spec:
  replicas: 1                          # Single Pod (DB typically runs as single instance)

  selector:
    matchLabels:                       # Used to identify Pods managed by Deployment
      project: roboshop                # MUST match template labels exactly
      component: mysql
      tier: db

  template:
    metadata:
      labels:                          # Labels applied to Pods
        project: roboshop
        component: mysql
        tier: db

    spec:
      containers:
      - name: mysql                    # Container name
        image: srinivasakysj/mysql:v1 # MySQL image (must exist in registry)
        imagePullPolicy: IfNotPresent # Pull image only if not already present (better for performance)

        env:                           # Environment variables required for MySQL startup
        - name: MYSQL_ROOT_PASSWORD    # Root password (MANDATORY for MySQL)
          value: password              # ⚠️ Use Secret in production
        - name: MYSQL_DATABASE         # Default database to create
          value: catalogue

        ports:
        - containerPort: 3306          # MySQL listens on port 3306

        readinessProbe:                # Checks if DB is ready to accept connections
          tcpSocket:                  # TCP check (MySQL has no HTTP endpoint)
            port: 3306
          initialDelaySeconds: 20      # Wait before first check (DB startup time)
          periodSeconds: 10            # Check every 10 seconds
          failureThreshold: 3          # Allow 3 failures before marking NOT READY

        livenessProbe:                 # Checks if DB is alive (restarts if unhealthy)
          tcpSocket:
            port: 3306
          initialDelaySeconds: 30      # Start later to avoid premature restart
          periodSeconds: 10            # Check every 10 seconds
          failureThreshold: 3          # Restart only after multiple failures

        volumeMounts:
        - name: mysql-config           # Volume name
          mountPath: /etc/mysql/conf.d/my.cnf  # Path inside container
          subPath: my.cnf              # Mount only this file (not full directory)

      volumes:
      - name: mysql-config             # Volume definition
        configMap:
          name: mysql                 # Refers to ConfigMap above

---
apiVersion: v1                        # Core API group
kind: Service                         # Service exposes MySQL inside cluster

metadata:
  name: mysql                         # Service name (DNS: mysql.roboshop)
  namespace: roboshop

spec:
  selector:                           # Routes traffic to Pods with matching labels
    project: roboshop                 # Must EXACTLY match Pod labels
    component: mysql
    tier: db

  ports:
  - protocol: TCP                     # Network protocol
    port: 3306                        # Service port (clients use this)
    targetPort: 3306                  # Container port inside Pod